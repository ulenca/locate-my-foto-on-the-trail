<main class="min-h-dvh bg-zinc-950 text-zinc-100">
  <div class="mx-auto max-w-6xl px-6 py-12">
    <header class="text-center">
      <h1 class="text-4xl font-semibold tracking-tight">Add location to your photos!</h1>
      <p class="mx-auto mt-3 max-w-2xl text-base text-zinc-300">
        All you need to do is to add GPX from your adventure and photos taken then.
      </p>
    </header>

    <section class="mt-10 grid gap-6 md:grid-cols-2">
      <!-- Photos panel -->
      <div class="panel">
        <div class="panel__header">
          <h2 class="panel__title">Photos</h2>
          <p class="panel__subtitle">Upload one or many photos.</p>
        </div>

        <div class="panel__content">
          <label class="btn">
            <input
              class="sr-only"
              type="file"
              accept=".jpg,.jpeg,image/jpeg"
              multiple
              (change)="onPhotosSelected($event)"
            />
            <span>Add photos</span>
          </label>

                <!-- Photos preview -->
          <div class="mt-6">
            <app-photo-preview [photos]="importedPhotos" [isLoading]="isReadingExif" />
          </div>

        </div>
      </div>

      <!-- GPX panel -->

      <app-gpx-panel (trackLoaded)="onTrackLoaded($event)" />

    </section>
<div class="mt-6 flex items-center justify-center">
  <button
    type="button"
    class="inline-flex items-center justify-center rounded-xl bg-zinc-100 px-6 py-3 text-sm font-semibold text-zinc-900 hover:bg-white disabled:opacity-50"
    [disabled]="!gpxTrack || importedPhotos.length === 0"
    (click)="locatePhotos()"
  >
    Locate photos
  </button>
  <button
  type="button"
  class="ml-3 inline-flex items-center justify-center rounded-xl bg-zinc-100 px-6 py-3 text-sm font-semibold text-zinc-900 hover:bg-white disabled:opacity-50"
  [disabled]="importedPhotos.length === 0"
  (click)="downloadGeotaggedPhotosZip()"
>
  Download photos (ZIP)
</button>
</div>
                <app-track-preview [track]="gpxTrack" />
              
  </div>
</main>
